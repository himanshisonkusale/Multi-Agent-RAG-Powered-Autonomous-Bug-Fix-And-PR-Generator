<svg viewBox="0 0 1300 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4A5568"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C0392B"/>
    </marker>
  </defs>

  <rect width="1300" height="660" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="30" y="34" font-size="22" font-weight="700" fill="#1A202C">Autonomous Bug Fixer — System Architecture</text>
  <text x="30" y="55" font-size="13" fill="#718096">Multi-agent RAG pipeline: from bug report to reviewed GitHub pull request</text>

  <!-- ===================== TRIGGER LAYER ===================== -->
  <rect x="30" y="85" width="230" height="150" rx="14" fill="#E8F0FE" stroke="#A9C6F5" stroke-width="1.5"/>
  <text x="50" y="112" font-size="14" font-weight="700" fill="#1A4FA0">Trigger Layer</text>

  <rect x="50" y="128" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#A9C6F5"/>
  <text x="65" y="153" font-size="12.5" fill="#2D3748">💬  Slack "@mention"</text>

  <rect x="50" y="180" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#A9C6F5"/>
  <text x="65" y="205" font-size="12.5" fill="#2D3748">🖥️  Web Dashboard Chat</text>

  <!-- ===================== INTENT ROUTER ===================== -->
  <rect x="300" y="85" width="200" height="150" rx="14" fill="#FDF3E3" stroke="#EFC873" stroke-width="1.5"/>
  <text x="320" y="112" font-size="14" font-weight="700" fill="#8A6116">Intent Router</text>
  <rect x="320" y="128" width="160" height="90" rx="8" fill="#FFFFFF" stroke="#EFC873"/>
  <text x="335" y="150" font-size="11.5" fill="#2D3748">Groq LLaMA classifies:</text>
  <text x="335" y="172" font-size="11.5" fill="#2D3748">• bug_fix</text>
  <text x="335" y="192" font-size="11.5" fill="#2D3748">• general_question</text>

  <!-- ===================== RAG RETRIEVAL ===================== -->
  <rect x="540" y="85" width="230" height="150" rx="14" fill="#E7F7F0" stroke="#8FDCB9" stroke-width="1.5"/>
  <text x="560" y="112" font-size="14" font-weight="700" fill="#1B7A4C">RAG Retrieval</text>

  <rect x="560" y="128" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#8FDCB9"/>
  <text x="575" y="153" font-size="12.5" fill="#2D3748">📌 Pinecone Vector DB</text>

  <rect x="560" y="180" width="190" height="42" rx="8" fill="#FFFFFF" stroke="#8FDCB9"/>
  <text x="575" y="205" font-size="12.5" fill="#2D3748">🔎 Top-K relevant chunks</text>

  <!-- ===================== MULTI-AGENT PIPELINE ===================== -->
  <rect x="810" y="85" width="460" height="230" rx="14" fill="#F3EBFB" stroke="#C6A6E8" stroke-width="1.5"/>
  <text x="830" y="112" font-size="14" font-weight="700" fill="#6B2FA0">Multi-Agent Pipeline (Groq LLaMA 3.1)</text>

  <rect x="830" y="130" width="130" height="160" rx="10" fill="#FFFFFF" stroke="#C6A6E8"/>
  <text x="845" y="155" font-size="12.5" font-weight="600" fill="#4A2570">Analyzer</text>
  <text x="845" y="178" font-size="10.5" fill="#5A5A6B">Understands bug,</text>
  <text x="845" y="193" font-size="10.5" fill="#5A5A6B">finds root cause</text>

  <line x1="965" y1="210" x2="1000" y2="210" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="1005" y="130" width="130" height="160" rx="10" fill="#FFFFFF" stroke="#C6A6E8"/>
  <text x="1020" y="155" font-size="12.5" font-weight="600" fill="#4A2570">Fixer</text>
  <text x="1020" y="178" font-size="10.5" fill="#5A5A6B">Generates precise</text>
  <text x="1020" y="193" font-size="10.5" fill="#5A5A6B">code diff</text>

  <line x1="1140" y1="210" x2="1175" y2="210" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="1180" y="130" width="80" height="160" rx="10" fill="#FFFFFF" stroke="#C6A6E8"/>
  <text x="1192" y="155" font-size="12.5" font-weight="600" fill="#4A2570">Reviewer</text>
  <text x="1192" y="178" font-size="10.5" fill="#5A5A6B">Confidence</text>
  <text x="1192" y="192" font-size="10.5" fill="#5A5A6B">score +</text>
  <text x="1192" y="206" font-size="10.5" fill="#5A5A6B">verdict</text>

  <!-- ===================== GITHUB PR ===================== -->
  <rect x="810" y="345" width="460" height="120" rx="14" fill="#FDECEA" stroke="#F0A79B" stroke-width="1.5"/>
  <text x="830" y="372" font-size="14" font-weight="700" fill="#A93226">GitHub Integration</text>

  <rect x="830" y="388" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#F0A79B"/>
  <text x="845" y="410" font-size="11.5" fill="#2D3748">🌿 New branch created</text>
  <text x="845" y="428" font-size="11.5" fill="#2D3748">📄 Fix committed</text>

  <rect x="1050" y="388" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#F0A79B"/>
  <text x="1065" y="410" font-size="11.5" fill="#2D3748">🔀 Pull Request opened</text>
  <text x="1065" y="428" font-size="11.5" fill="#2D3748">🔒 Requires human review</text>

  <!-- ===================== RESPONSE LAYER ===================== -->
  <rect x="30" y="345" width="700" height="120" rx="14" fill="#EEF1F4" stroke="#C3CBD3" stroke-width="1.5"/>
  <text x="50" y="372" font-size="14" font-weight="700" fill="#2D3748">Response Delivered Back to User</text>

  <rect x="50" y="388" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#C3CBD3"/>
  <text x="65" y="410" font-size="11.5" fill="#2D3748">💬 Slack reply with</text>
  <text x="65" y="428" font-size="11.5" fill="#2D3748">score + PR link</text>

  <rect x="270" y="388" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#C3CBD3"/>
  <text x="285" y="410" font-size="11.5" fill="#2D3748">🖥️ Dashboard card:</text>
  <text x="285" y="428" font-size="11.5" fill="#2D3748">gauge + reasoning</text>

  <rect x="490" y="388" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#C3CBD3"/>
  <text x="505" y="410" font-size="11.5" fill="#2D3748">💡 Plain-text answer</text>
  <text x="505" y="428" font-size="11.5" fill="#2D3748">(general questions)</text>

  <!-- ===================== FLOW ARROWS (main path) ===================== -->
  <line x1="260" y1="160" x2="295" y2="160" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="160" x2="535" y2="160" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="160" x2="805" y2="160" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- pipeline down to github -->
  <line x1="1040" y1="315" x2="1040" y2="340" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- github + pipeline down to response layer -->
  <path d="M 830 465 L 830 490 L 400 490 L 400 465" fill="none" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- intent router direct-to-response for general questions (bypass agents) -->
  <path d="M 400 235 L 400 300 L 590 300 L 590 383" fill="none" stroke="#8A6116" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="410" y="295" font-size="10" fill="#8A6116" font-style="italic">general_question → skip pipeline</text>

  <!-- ===================== LEGEND / FOOTER ===================== -->
  <text x="30" y="510" font-size="12" fill="#718096">Backend: Node.js + Express  ·  LLM: Groq (LLaMA 3.1)  ·  Vector store: Pinecone (integrated embeddings)  ·  Bot: Slack Bolt  ·  VCS: GitHub (Octokit)</text>

  <rect x="30" y="540" width="1240" height="1" fill="#E2E8F0"/>
  <text x="30" y="570" font-size="14" font-weight="700" fill="#1A202C">Key safeguards</text>
  <text x="30" y="595" font-size="12" fill="#4A5568">🔒  Branch protection — no direct pushes to main, PR review always required, regardless of confidence score</text>
  <text x="30" y="618" font-size="12" fill="#4A5568">📊  Confidence score + written reasoning shown on every fix — nothing merges silently</text>
  <text x="30" y="641" font-size="12" fill="#4A5568">🧭  Intent routing — general questions get answered directly, without generating an unnecessary fix or PR</text>
</svg>
