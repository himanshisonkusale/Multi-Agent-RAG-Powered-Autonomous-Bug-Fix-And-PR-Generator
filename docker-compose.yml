version: "3.9"

services:
  app:
    build: .
    container_name: autonomous-bug-fixer
    ports:
      - "8080:8080"
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./dashboard:/app/dashboard
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bug-fixer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:


  